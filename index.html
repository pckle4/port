    <meta charset="UTF-8" />

    <meta name="description" content="Ansh Shah - Full Stack Developer Portfolio. Specialized in React, Node.js, and modern web technologies.">
    
    <!-- Mobile Web App Capability -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">

    <title>Ansh Shah - Full Stack Developer</title>
    
    <!-- Performance Optimization: Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    
    <!-- Performance Optimization: Preload critical assets -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style">
    
    <!-- Critical CSS Fallback: Prevents FOUC and Giant Icons if JS/CDN delays -->
    <style>
      :root {
        --bg-primary: #ffffff;
        --text-primary: #000000;
      }
      .dark {
        --bg-primary: #030712; /* gray-950 */
        --text-primary: #f9fafb; /* gray-50 */
      }
      
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Safety Cap for SVGs to prevent explosion before Tailwind loads */
      svg {
        max-width: 2rem; 
        max-height: 2rem;
        display: inline-block;
      }

      /* Initial loader styles if needed */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }
    </style>

    <!-- Immediate Theme Restoration Script (Blocking) -->
    <script>
      (function() {
        try {
          var storageKey = "vite-ui-theme";
          var theme = localStorage.getItem(storageKey);
          var supportDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var element = document.documentElement;
          var isDark = theme === "dark" || (theme === "system" && supportDarkMode) || (!theme && supportDarkMode);
          
          if (isDark) {
            element.classList.add("dark");
          } else {
            element.classList.remove("dark");
          }
        } catch (e) {
          console.error("Critical theme restoration failed", e);
        }
      })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          container: {
            center: true,
            padding: "2rem",
            screens: {
              "2xl": "1400px",
            },
          },
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            transitionTimingFunction: {
              "spring-gentle": "cubic-bezier(0.4, 0, 0.2, 1)",
            },
            animation: {
              "spin-slow": "spin-slow 3s linear infinite",
              "bounce-subtle": "bounce-subtle 1s ease-in-out infinite",
              "fade-in": "fade-in 1s ease-out",
              "expand": "expand 2s ease-out forwards",
              "loading": "loading 1.5s infinite",
              "grid-movement": "grid-movement 20s linear infinite",
              "shimmer-slide": "shimmer-slide 4s linear infinite",
              "swing": "swing 3.5s ease-in-out infinite",
            },
            keyframes: {
              "spin-slow": {
                "0%": { transform: "rotate(0deg)" },
                "100%": { transform: "rotate(360deg)" },
              },
              "bounce-subtle": {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-2px)" },
              },
              "fade-in": {
                "0%": { opacity: "0", transform: "translateY(10px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              "expand": {
                "0%": { width: "0%", opacity: "0" },
                "50%": { opacity: "1" },
                "100%": { width: "100%", opacity: "0.8" },
              },
              "loading": {
                "0%": { backgroundPosition: "200% 0" },
                "100%": { backgroundPosition: "-200% 0" },
              },
              "grid-movement": {
                "0%": { transform: "rotateX(60deg) translateY(-20%) translateZ(0)" },
                "100%": { transform: "rotateX(60deg) translateY(calc(-20% + 50px)) translateZ(0)" }
              },
              "shimmer-slide": {
                "0%": { transform: "translateX(-100%) skewX(-20deg)" },
                "100%": { transform: "translateX(200%) skewX(-20deg)" }
              },
              "swing": {
                "0%, 100%": { transform: "rotate(1.5deg)" },
                "50%": { transform: "rotate(-1.5deg)" },
              }
            }
          },
        },
      }
    </script>
    <style type="text/tailwindcss">

        :root {
          --background: 0 0% 100%;
          --foreground: 222.2 84% 4.9%;
          --card: 0 0% 100%;

          --primary: 222.2 47.4% 11.2%;
          --primary-foreground: 210 40% 98%;
          --secondary: 210 40% 96%;
          --secondary-foreground: 222.2 47.4% 11.2%;
          --muted: 210 40% 96%;
          --muted-foreground: 215.4 16.3% 46.9%;
          --accent: 210 40% 96%;
          --accent-foreground: 222.2 47.4% 11.2%;
          --destructive: 0 84.2% 60.2%;
          --destructive-foreground: 210 40% 98%;
          --border: 214.3 31.8% 91.4%;
          --input: 214.3 31.8% 91.4%;
          --ring: 222.2 84% 4.9%;
          --radius: 0.5rem;
        }
        .dark {
          --background: 222.2 84% 4.9%;
          --foreground: 210 40% 98%;
          --card: 222.2 84% 4.9%;
          --card-foreground: 210 40% 98%;
          --popover: 222.2 84% 4.9%;
          --popover-foreground: 210 40% 98%;
          --primary: 210 40% 98%;
          --primary-foreground: 222.2 47.4% 11.2%;
          --secondary: 217.2 32.6% 17.5%;
          --secondary-foreground: 210 40% 98%;
          --muted: 217.2 32.6% 17.5%;
          --muted-foreground: 215 20.2% 65.1%;
          --accent: 217.2 32.6% 17.5%;
          --accent-foreground: 210 40% 98%;
          --destructive: 0 62.8% 30.6%;
          --destructive-foreground: 210 40% 98%;
          --border: 217.2 32.6% 17.5%;
          --input: 217.2 32.6% 17.5%;
          --ring: 212.7 26.8% 83.9%;
        }
        * {
          @apply border-border;
        }
        body {
          @apply bg-background text-foreground;
          font-feature-settings: "rlig" 1, "calt" 1;
          font-family: 'Inter', sans-serif;
          /* Optimized Transition: Removed global layout-triggering transitions for smoothness */
          /* transition: background-color 0.3s ease, color 0.3s ease; */
          text-rendering: optimizeLegibility;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          
          /* Prevent rubber-banding on iOS if needed, though smooth scroll usually handles it */
          overscroll-behavior-y: none;
          
          /* Better touch handling */
          touch-action: manipulation;
        }
        
        /* Force 16px font size on inputs for mobile to prevent iOS zoom */
        @media screen and (max-width: 768px) {
          input, textarea, select, button {
            font-size: 16px !important;
          }
        }
      }
      
      .text-balance {
        text-wrap: balance;
      }
      
      /* Mobile-optimized utilities */
      .line-clamp-1 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 1;
      }

      .line-clamp-2 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      
      html {
        scroll-behavior: smooth;
        height: 100%;
      }
      body {
        height: 100%;
      }

      /* View Transitions API Animations */
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation: none;
        mix-blend-mode: normal;
      }
      /* Always keep NEW view on top for expanding circle effect */
      ::view-transition-new(root) {
        z-index: 2147483646;
      }
      ::view-transition-old(root) {
        z-index: 1;
      }

      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        body {
          background: white !important;
          color: black !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        .print-hidden {
          display: none !important;
        }
        .no-print {
          display: none !important;
        }
      }
    </style>
