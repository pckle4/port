<section id="home" #heroHost
  class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 md:px-8 pt-20 md:pt-24 pb-12 sm:pb-16">

  <!-- Dark-mode grid with shimmer sweep -->
  <div class="hero-grid" aria-hidden="true">
    <div class="hero-grid-lines"></div>
    <div class="hero-grid-shimmer"></div>
  </div>

  @if (isDesktop) {
  <app-floating-icons></app-floating-icons>
  }

  <div class="container mx-auto text-center max-w-5xl relative z-10">

    <!-- Open to Work Badge -->
    <div class="mb-10 sm:mb-12 md:mb-6 lg:mb-4 -mt-4 md:mt-2 flex justify-center animate-slide-up relative z-20">
      <div
        class="group relative inline-flex overflow-hidden rounded-full p-[2px] transition-all duration-500 hover:scale-105 hover:shadow-[0_0_2rem_-0.5rem_rgba(217,140,115,0.45)]">
        <span
          class="absolute inset-[-1000%] animate-[spin_2s_linear_infinite] sm:animate-[spin_4s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#1676F3_0%,#0C4CC7_20%,#5F5CE0_38%,#EB3357_56%,#FCA818_74%,#13AEDD_90%,#1676F3_100%)]"></span>
        <div
          class="relative inline-flex h-full w-full cursor-default items-center justify-center rounded-full px-4 sm:px-5 py-1.5 sm:py-2 text-xs sm:text-sm font-medium bg-white dark:bg-[#0C1120] backdrop-blur-3xl">
          <lucide-icon name="zap"
            class="w-3.5 h-3.5 sm:w-4 sm:h-4 mr-1.5 sm:mr-2 text-accent dark:text-accent fill-accent dark:fill-accent"></lucide-icon>
          <span class="text-foreground dark:text-foreground font-semibold">Open to Work</span>
          <lucide-icon name="chevron-right"
            class="w-3.5 h-3.5 sm:w-4 sm:h-4 ml-1 sm:ml-1.5 text-primary dark:text-primary group-hover:translate-x-0.5 transition-transform"></lucide-icon>
        </div>
      </div>
    </div>

    <!-- Greeting -->
    <div class="mb-4 sm:mb-5 md:mb-3 flex items-center justify-center space-x-2 text-muted-foreground animate-slide-up"
      style="animation-delay: 100ms">
      <span class="text-lg sm:text-xl font-medium tracking-wide">👋 Hi there, I'm</span>
    </div>

    <!-- Name -->
    <h1
      class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl xl:text-[6rem] font-black mb-6 sm:mb-8 md:mb-4 lg:mb-3 tracking-tight relative inline-block animate-slide-up select-none pointer-events-none leading-none"
      style="animation-delay: 200ms">
      <span class="animate-gradient-text hero-name-gradient">Ansh Shah</span>
      <lucide-icon name="sparkles"
        class="absolute -top-2 sm:-top-3 -right-4 sm:-right-6 w-6 h-6 sm:w-8 sm:h-8 md:w-10 md:h-10 text-accent hidden sm:block animate-pulse"></lucide-icon>
    </h1>

    <!-- Dynamic Headline -->
    <div
      class="h-16 sm:h-20 md:h-24 lg:h-28 flex items-center justify-center mb-8 sm:mb-10 md:mb-6 lg:mb-5 text-2xl sm:text-3xl md:text-4xl lg:text-5xl xl:text-6xl font-bold text-slate-900 dark:text-white animate-slide-up select-none pointer-events-none"
      style="animation-delay: 300ms">
      <app-animated-headline [words]="dynamicWords"></app-animated-headline>
    </div>

    <!-- Description -->
    <p class="mb-10 sm:mb-12 md:mb-8 lg:mb-6 text-base sm:text-lg md:text-xl lg:text-2xl text-muted-foreground max-w-3xl mx-auto leading-relaxed animate-slide-up text-balance"
      style="animation-delay: 400ms">
      Building <span class="text-primary dark:text-primary font-bold">digital masterpieces 🎨</span> that
      seamlessly blend
      <span class="inline-block relative font-bold text-foreground px-1 mx-1 z-10 group cursor-default">
        complex logic 🧠
        <span class="absolute bottom-0 sm:bottom-1 left-0 w-full h-[40%] bg-gradient-to-r from-primary/30 via-accent/20 to-[hsl(var(--light-bronze))]/30 -z-10 rounded-sm group-hover:h-full group-hover:opacity-60 transition-all duration-300"></span>
      </span>
      with
      <span class="inline-block relative font-bold text-foreground px-1 mx-1 z-10 group cursor-default">
        elegant aesthetics ✨
        <span class="absolute bottom-0 sm:bottom-1 left-0 w-full h-[40%] bg-gradient-to-r from-[hsl(var(--light-coral))]/30 via-accent/20 to-[hsl(var(--dusty-lavender))]/30 -z-10 rounded-sm group-hover:h-full group-hover:opacity-60 transition-all duration-300"></span>
      </span>.
    </p>

    <!-- CTA Buttons -->
    <div
      class="flex flex-col sm:flex-row gap-4 sm:gap-6 justify-center items-center mb-10 sm:mb-12 md:mb-8 lg:mb-6 px-4 sm:px-0 animate-slide-up safe-area-inset"
      style="animation-delay: 500ms">

      <!-- Primary CTA -->
      <button (click)="scrollToProjects()"
        class="group btn-primary-action w-full sm:w-auto min-w-[160px] sm:min-w-[180px] h-11 sm:h-12 text-sm sm:text-base touch-feedback">
        <lucide-icon name="code" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10">View Work</span>
        <lucide-icon name="chevron-right"
          class="ml-1 h-4 w-4 btn-feedback-icon relative z-10"></lucide-icon>
      </button>

      <!-- Secondary CTA -->
      <a routerLink="/resume"
        class="group btn-outline-action w-full sm:w-auto min-w-[160px] sm:min-w-[180px] h-11 sm:h-12 text-sm sm:text-base touch-feedback">
        <lucide-icon name="download" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10">Resume</span>
        <lucide-icon name="arrow-up-right" class="ml-1 h-4 w-4 btn-feedback-icon relative z-10"></lucide-icon>
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex justify-center gap-4 sm:gap-5 animate-slide-up" style="animation-delay: 600ms">
      @for (social of socials; track social.label) {
      <a [href]="social.href" target="_blank" rel="noopener noreferrer" [aria-label]="social.label"
        class="p-2.5 sm:p-3 rounded-full bg-white/70 dark:bg-white/5 border border-primary/20 dark:border-white/10 hover:shadow-lg hover:shadow-primary/15 transition-all duration-500 hover:scale-110 hover:-translate-y-1 backdrop-blur-none sm:backdrop-blur-md touch-feedback"
        [class]="social.color">
        <lucide-icon [name]="social.icon" class="w-4 h-4 sm:w-5 sm:h-5"></lucide-icon>
      </a>
      }
    </div>
  </div>

  <!-- Scroll indicator -->
  <button
    class="scroll-bob absolute bottom-6 sm:bottom-8 left-1/2 cursor-pointer p-2.5 sm:p-3 rounded-full hover:bg-white/20 transition-opacity duration-300 z-20 opacity-60 hover:opacity-100"
    (click)="scrollToAbout()" aria-label="Scroll down to about section">
    <lucide-icon name="arrow-down"
      class="w-5 h-5 sm:w-6 sm:h-6 text-primary/70 dark:text-primary/70 hover:text-primary dark:hover:text-primary transition-colors"></lucide-icon>
  </button>
</section>
