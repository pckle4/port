<section id="home" #heroHost
  class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 md:px-8 pt-20 md:pt-24 pb-16">
  <app-grid-background></app-grid-background>

  @if (isDesktop) {
  <app-floating-icons></app-floating-icons>
  }

  <div class="container mx-auto text-center max-w-5xl relative z-10">

    <div class="mb-8 -mt-2 md:mt-4 flex justify-center animate-slide-up relative z-20">
      <div
        class="group relative inline-flex overflow-hidden rounded-full p-[2px] transition-all duration-300 hover:scale-105 hover:shadow-[0_0_2rem_-0.5rem_#06b6d4]">
        <span
          class="absolute inset-[-1000%] animate-[spin_3s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#67e8f9_0%,#14b8a6_50%,#67e8f9_100%)]"></span>
        <div
          class="relative inline-flex h-full w-full cursor-default items-center justify-center rounded-full px-5 py-2 text-sm font-medium bg-white dark:bg-slate-950 backdrop-blur-3xl">
          <lucide-icon name="zap"
            class="w-4 h-4 mr-2 text-amber-500 dark:text-amber-400 fill-amber-500 dark:fill-amber-400"></lucide-icon>
          <span class="text-gray-900 dark:text-white font-semibold">Open to Work</span>
          <lucide-icon name="chevron-right"
            class="w-4 h-4 ml-1.5 text-cyan-500 dark:text-cyan-400 group-hover:translate-x-0.5 transition-transform"></lucide-icon>
        </div>
      </div>
    </div>

    <div class="mb-3 flex items-center justify-center space-x-2 text-muted-foreground animate-slide-up"
      style="animation-delay: 100ms">
      <span class="text-lg font-light tracking-wide">Hi, I'm</span>
    </div>

    <h1
      class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black mb-5 tracking-tight relative inline-block animate-slide-up select-none pointer-events-none"
      style="animation-delay: 200ms">
      <span class="animate-gradient-text">Ansh Shah</span>
      <lucide-icon name="sparkles"
        class="absolute -top-3 -right-6 w-8 h-8 sm:w-10 sm:h-10 text-amber-400 hidden sm:block"></lucide-icon>
    </h1>

    <div
      class="h-16 sm:h-20 md:h-24 flex items-center justify-center mb-5 text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold animate-slide-up select-none pointer-events-none"
      style="animation-delay: 300ms">
      <app-animated-headline [words]="dynamicWords"></app-animated-headline>
    </div>

    <p class="mb-8 text-base sm:text-lg md:text-xl text-muted-foreground max-w-2xl mx-auto leading-relaxed animate-slide-up"
      style="animation-delay: 400ms">
      Building <span class="text-cyan-500 dark:text-cyan-400 font-semibold">digital masterpieces</span> that
      seamlessly blend
      <span class="inline-block relative font-medium text-foreground mx-1">
        complex logic
        <span class="absolute bottom-1 left-0 w-full h-[3px] bg-cyan-400/30 -z-10 rounded-full"></span>
      </span>
      with
      <span class="inline-block relative font-medium text-foreground mx-1">
        elegant aesthetics
        <span class="absolute bottom-1 left-0 w-full h-[3px] bg-amber-400/30 -z-10 rounded-full"></span>
      </span>.
    </p>

    <div
      class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center items-center mb-10 px-2 sm:px-0 animate-slide-up safe-area-inset"
      style="animation-delay: 500ms">
      <button (click)="scrollToProjects()"
        class="group w-full sm:w-auto min-w-[160px] h-12 sm:h-12 text-base font-semibold bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 text-white rounded-full shadow-lg shadow-cyan-500/25 border-0 transition-all duration-200 hover:scale-[1.02] hover:shadow-xl hover:shadow-cyan-500/30 active:scale-[0.98] touch-feedback flex items-center justify-center">
        <lucide-icon name="code"
          class="mr-2 h-4 w-4"></lucide-icon>
        View Work
        <lucide-icon name="chevron-right"
          class="ml-1 h-4 w-4 opacity-0 -translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-200"></lucide-icon>
      </button>

      <a routerLink="/resume"
        class="group w-full sm:w-auto min-w-[160px] h-12 sm:h-12 text-base font-semibold rounded-full bg-white/80 dark:bg-black/80 backdrop-blur-none sm:backdrop-blur-sm border-2 border-gray-200 dark:border-gray-700 hover:border-cyan-500 dark:hover:border-cyan-400 hover:bg-cyan-500 dark:hover:bg-cyan-500/20 hover:text-white dark:hover:text-white transition-all duration-200 hover:scale-[1.02] active:scale-[0.98] touch-feedback flex items-center justify-center text-foreground">
        <lucide-icon name="download" class="mr-2 h-4 w-4"></lucide-icon>
        Resume
      </a>
    </div>

    <div class="flex justify-center gap-5 animate-slide-up" style="animation-delay: 600ms">
      @for (social of socials; track social.label) {
      <a [href]="social.href" target="_blank" rel="noopener noreferrer" [aria-label]="social.label"
        class="p-3 rounded-full bg-white/60 dark:bg-white/5 border border-slate-200 dark:border-slate-700 hover:shadow-lg transition-all duration-300 hover:scale-110 hover:-translate-y-1 backdrop-blur-none sm:backdrop-blur-md touch-feedback"
        [class]="social.color">
        <lucide-icon [name]="social.icon" class="w-5 h-5"></lucide-icon>
      </a>
      }
    </div>
  </div>

  <button
    class="absolute bottom-8 left-1/2 -translate-x-1/2 cursor-pointer p-3 rounded-full hover:bg-white/20 transition-all duration-300 z-20 opacity-60 hover:opacity-100"
    (click)="scrollToAbout()" aria-label="Scroll down to about section">
    <lucide-icon name="arrow-down"
      class="w-6 h-6 text-cyan-400/70 hover:text-cyan-500 transition-colors"></lucide-icon>
  </button>
</section>
