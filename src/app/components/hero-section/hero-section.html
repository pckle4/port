<section id="home" #heroHost
  class="min-h-[100dvh] flex flex-col items-center justify-center relative overflow-hidden px-4 sm:px-6 pt-24 sm:pt-32 pb-16 sm:pb-8">

  <!-- Dark-mode grid with shimmer sweep -->
  <div class="absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-[600ms] ease-[ease] [contain:strict] z-0 dark:opacity-100" aria-hidden="true">
    <div class="absolute inset-0 bg-[linear-gradient(hsl(var(--primary)/0.07)_1px,transparent_1px),linear-gradient(90deg,hsl(var(--primary)/0.07)_1px,transparent_1px)] bg-[size:60px_60px] [mask-image:radial-gradient(ellipse_90%_75%_at_50%_5%,black_15%,transparent_85%)] [-webkit-mask-image:radial-gradient(ellipse_90%_75%_at_50%_5%,black_15%,transparent_85%)]"></div>
    <div class="absolute inset-0 bg-[linear-gradient(108deg,transparent_10%,hsl(var(--primary)/0.13)_35%,hsl(var(--dusty-lavender)/0.09)_50%,hsl(var(--primary)/0.06)_62%,transparent_82%)] bg-[size:250%_100%] bg-[position:200%_0] animate-[hero-shimmer_5.5s_cubic-bezier(0.4,0,0.2,1)_infinite] will-change-[background-position,opacity] max-sm:animate-none max-sm:opacity-0"></div>
  </div>

  @if (isDesktop) {
  <app-floating-icons></app-floating-icons>
  }

  <div class="container mx-auto text-center max-w-5xl relative z-10">

    <!-- Open to Work Badge -->
    <div class="mb-8 sm:mb-10 md:mb-8 lg:mb-6 flex justify-center animate-slide-up relative z-20">
      <div
        class="group relative inline-flex overflow-hidden rounded-sketchy-1 px-3 sm:px-4 py-1 sm:py-1.5 transition-all duration-300 hover:-translate-y-1 hover:-rotate-2 border-2 border-amber-500/40 dark:border-amber-400/40 bg-[#FBF7F0] dark:bg-[hsl(var(--card))] shadow-stamp dark:shadow-glow-charcoal cursor-default items-center justify-center gap-1.5 sm:gap-2">
        <lucide-icon name="zap"
          class="w-3.5 h-3.5 text-amber-500 dark:text-amber-400 fill-amber-500 dark:fill-amber-400 animate-pulse"></lucide-icon>
        <span class="text-foreground font-handwriting text-sm sm:text-base font-bold">Open to Work</span>
        <lucide-icon name="chevron-right"
          class="w-3.5 h-3.5 text-muted-foreground group-hover:translate-x-1 transition-transform"></lucide-icon>
      </div>
    </div>

    <!-- Greeting -->
    <div class="mb-4 sm:mb-5 md:mb-4 flex items-center justify-center space-x-2 text-muted-foreground animate-slide-up"
      style="animation-delay: 100ms">
      <span class="text-sm sm:text-base md:text-lg font-medium tracking-wide">👋 Hi there, I'm</span>
    </div>

    <!-- Name -->
    <h1
      class="text-[38px] sm:text-4xl md:text-5xl lg:text-6xl font-display font-black mb-3 sm:mb-4 tracking-tight relative inline-block animate-slide-up select-none pointer-events-none leading-[1.1]"
      style="animation-delay: 200ms">
      <span class="text-foreground">Ansh Shah</span>
      <lucide-icon name="pencil"
        class="absolute -top-2 sm:-top-3 -right-3 sm:-right-4 w-5 h-5 sm:w-6 sm:h-6 text-amber-500 dark:text-amber-400 hidden sm:block animate-pulse"></lucide-icon>
    </h1>

    <div
      class="h-7 sm:h-8 md:h-10 lg:h-12 flex items-center justify-center mb-6 sm:mb-8 text-[17px] sm:text-xl md:text-2xl lg:text-3xl font-display font-bold text-foreground animate-slide-up select-none pointer-events-none"
      style="animation-delay: 300ms">
      <app-animated-headline [words]="dynamicWords"></app-animated-headline>
    </div>

    <!-- Description -->
    <p class="mb-10 sm:mb-12 md:mb-8 lg:mb-6 text-[13px] sm:text-sm md:text-base lg:text-lg text-muted-foreground max-w-2xl mx-auto leading-relaxed animate-slide-up"
      style="animation-delay: 400ms">
      Building
      <span class="relative inline-flex items-center justify-center px-1.5 sm:px-2 py-[1px] sm:py-0.5 mx-0.5 sm:mx-1 font-bold text-foreground z-10 group cursor-default transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] hover:-translate-y-1">
        <span class="relative z-10 group-hover:text-white transition-colors duration-300 drop-shadow-sm">digital masterpieces 🎨</span>
        <span class="absolute inset-0 w-full h-full bg-destructive/15 dark:bg-destructive/20 -z-10 rounded-[6px] transition-all duration-500 ease-out group-hover:bg-destructive group-hover:scale-105 group-hover:shadow-[0_0_24px_-4px_rgba(223,73,148,0.65)]"></span>
        <span class="absolute inset-0 w-full h-full rounded-[6px] opacity-0 group-hover:opacity-100 bg-[linear-gradient(110deg,transparent,rgba(255,255,255,0.35),transparent)] bg-[size:200%_100%] group-hover:animate-[shine_1.5s_infinite] pointer-events-none -z-10 mix-blend-overlay"></span>
      </span>
      that seamlessly blend
      <span class="relative inline-flex items-center justify-center px-1.5 sm:px-2 py-[1px] sm:py-0.5 mx-0.5 sm:mx-1 font-bold text-foreground z-10 group cursor-default transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] hover:-translate-y-1">
        <span class="relative z-10 group-hover:text-amber-950 transition-colors duration-300 drop-shadow-sm">complex logic 🧠</span>
        <span class="absolute inset-0 w-full h-full bg-warning-amber/15 dark:bg-warning-amber/20 -z-10 rounded-[6px] transition-all duration-500 ease-out group-hover:bg-warning-amber group-hover:scale-105 group-hover:shadow-[0_0_24px_-4px_rgba(251,168,24,0.65)]"></span>
        <span class="absolute inset-0 w-full h-full rounded-[6px] opacity-0 group-hover:opacity-100 bg-[linear-gradient(110deg,transparent,rgba(255,255,255,0.45),transparent)] bg-[size:200%_100%] group-hover:animate-[shine_1.5s_infinite] pointer-events-none -z-10 mix-blend-overlay"></span>
      </span>
      with
      <span class="relative inline-flex items-center justify-center px-1.5 sm:px-2 py-[1px] sm:py-0.5 mx-0.5 sm:mx-1 font-bold text-foreground z-10 group cursor-default transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] hover:-translate-y-1">
        <span class="relative z-10 group-hover:text-white transition-colors duration-300 drop-shadow-sm">elegant aesthetics 🪄</span>
        <span class="absolute inset-0 w-full h-full bg-action-blue/15 dark:bg-primary/20 -z-10 rounded-[6px] transition-all duration-500 ease-out group-hover:bg-action-blue dark:group-hover:bg-primary group-hover:scale-105 group-hover:shadow-[0_0_24px_-4px_rgba(22,118,243,0.65)] dark:group-hover:shadow-[0_0_24px_-4px_rgba(77,163,255,0.65)]"></span>
        <span class="absolute inset-0 w-full h-full rounded-[6px] opacity-0 group-hover:opacity-100 bg-[linear-gradient(110deg,transparent,rgba(255,255,255,0.35),transparent)] bg-[size:200%_100%] group-hover:animate-[shine_1.5s_infinite] pointer-events-none -z-10 mix-blend-overlay"></span>
      </span>.
    </p>

    <!-- CTA Buttons -->
    <div
      class="flex flex-col sm:flex-row gap-4 sm:gap-5 justify-center items-center mb-10 sm:mb-12 md:mb-8 lg:mb-6 px-4 sm:px-0 animate-slide-up safe-area-inset w-full max-w-[280px] sm:max-w-none mx-auto"
      style="animation-delay: 500ms">

      <!-- Primary CTA -->
      <button (click)="scrollToProjects()"
        class="group font-handwriting text-base sm:text-lg font-medium bg-warning-amber text-[#121826] dark:text-[#0C0C0E] rounded-sketchy-2 shadow-stamp dark:shadow-glow-accent hover:shadow-stamp-hover dark:hover:shadow-glow-accent hover:-rotate-1 transition-all w-full sm:w-auto min-w-[120px] sm:min-w-[140px] h-9 sm:h-11 flex items-center justify-center touch-feedback z-10 border-2 border-transparent">
        <lucide-icon name="pen-tool" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10 pt-1">View Work</span>
      </button>

      <!-- Secondary CTA -->
      <a routerLink="/resume"
        class="group font-sans border-2 border-action-blue/50 dark:border-primary/50 text-action-blue dark:text-primary bg-transparent border-dashed rounded-sketchy-3 hover:bg-action-blue hover:text-white dark:hover:bg-primary/10 dark:hover:text-primary transition-all w-full sm:w-auto min-w-[120px] sm:min-w-[140px] h-9 sm:h-11 flex items-center justify-center text-xs sm:text-sm touch-feedback z-10">
        <lucide-icon name="file-text" class="mr-2 h-3.5 w-3.5 relative z-10"></lucide-icon>
        <span class="relative z-10">Resume</span>
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex justify-center gap-3 sm:gap-4 animate-slide-up" style="animation-delay: 600ms">
      @for (social of socials; track social.label) {
      <a [href]="social.href" target="_blank" rel="noopener noreferrer" [aria-label]="social.label"
        class="p-1.5 sm:p-2 rounded-full bg-white/70 dark:bg-white/5 border border-primary/20 dark:border-border hover:shadow-lg hover:shadow-primary/15 transition-all duration-500 hover:scale-110 hover:-translate-y-1 backdrop-blur-none sm:backdrop-blur-md touch-feedback"
        [class]="social.color">
        <lucide-icon [name]="social.icon" class="w-3.5 h-3.5 sm:w-4 sm:h-4"></lucide-icon>
      </a>
      }
    </div>
  </div>

  <!-- Scroll indicator -->
  <button
    class="animate-[scroll-bob_2s_ease-in-out_infinite] will-change-transform absolute bottom-3 sm:bottom-5 left-1/2 cursor-pointer p-2 sm:p-2.5 rounded-full hover:bg-white/20 transition-opacity duration-300 z-20 opacity-60 hover:opacity-100"
    (click)="scrollToAbout()" aria-label="Scroll down to about section">
    <lucide-icon name="arrow-down"
      class="w-4 h-4 sm:w-5 sm:h-5 text-primary/70 dark:text-primary/70 hover:text-primary dark:hover:text-primary transition-colors"></lucide-icon>
  </button>
</section>
