<section id="home" #heroHost
  class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 md:px-8 pt-20 sm:pt-24 pb-8 sm:pb-12">

  <!-- Dark-mode grid with shimmer sweep -->
  <div class="hero-grid" aria-hidden="true">
    <div class="hero-grid-lines"></div>
    <div class="hero-grid-shimmer"></div>
  </div>

  @if (isDesktop) {
  <app-floating-icons></app-floating-icons>
  }

  <div class="container mx-auto text-center max-w-5xl relative z-10">

    <!-- Open to Work Badge -->
    <div class="mb-6 sm:mb-8 md:mb-6 lg:mb-4 -mt-2 flex justify-center animate-slide-up relative z-20">
      <div
        class="group relative inline-flex overflow-hidden rounded-sketchy-1 px-4 sm:px-5 py-1.5 sm:py-2 transition-all duration-300 hover:-translate-y-1 hover:-rotate-2 border-2 border-warning-amber bg-[#FBF7F0] dark:bg-[hsl(var(--card))] shadow-stamp dark:shadow-glow-charcoal cursor-default items-center justify-center gap-2">
        <lucide-icon name="zap"
          class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-warning-amber fill-warning-amber animate-pulse"></lucide-icon>
        <span class="text-foreground font-handwriting text-base sm:text-lg font-bold">Open to Work</span>
        <lucide-icon name="chevron-right"
          class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-muted-foreground group-hover:translate-x-1 transition-transform"></lucide-icon>
      </div>
    </div>

    <!-- Greeting -->
    <div class="mb-2 sm:mb-4 md:mb-3 flex items-center justify-center space-x-2 text-muted-foreground animate-slide-up"
      style="animation-delay: 100ms">
      <span class="text-base sm:text-lg font-medium tracking-wide">👋 Hi there, I'm</span>
    </div>

    <!-- Name -->
    <h1
      class="text-5xl sm:text-6xl md:text-7xl lg:text-7xl xl:text-[5rem] font-display font-black mb-4 sm:mb-6 md:mb-4 lg:mb-3 tracking-tight relative inline-block animate-slide-up select-none pointer-events-none leading-none"
      style="animation-delay: 200ms">
      <span class="text-foreground">Ansh Shah</span>
      <lucide-icon name="pencil"
        class="absolute -top-2 sm:-top-3 -right-4 sm:-right-6 w-6 h-6 sm:w-8 sm:h-8 text-warning-amber hidden sm:block animate-pulse"></lucide-icon>
    </h1>

    <!-- Dynamic Headline -->
    <div
      class="h-10 sm:h-12 md:h-16 lg:h-20 flex items-center justify-center mb-6 sm:mb-8 md:mb-6 lg:mb-5 text-xl sm:text-3xl md:text-4xl lg:text-5xl xl:text-5xl font-display font-bold text-foreground animate-slide-up select-none pointer-events-none"
      style="animation-delay: 300ms">
      <app-animated-headline [words]="dynamicWords"></app-animated-headline>
    </div>

    <!-- Description -->
    <p class="mb-8 sm:mb-10 md:mb-8 lg:mb-6 text-sm sm:text-base md:text-lg lg:text-xl text-muted-foreground max-w-2xl mx-auto leading-relaxed animate-slide-up text-balance"
      style="animation-delay: 400ms">
      Building <span class="inline-block relative font-bold text-foreground px-1 z-10 group cursor-default">
        digital masterpieces 🎨
        <span class="absolute inset-0 w-full h-full bg-destructive/30 dark:bg-destructive/40 -z-10 rounded-sm group-hover:opacity-80 transition-all duration-300"></span>
      </span> that
      seamlessly blend
      <span class="inline-block relative font-bold text-foreground px-1 mx-1 z-10 group cursor-default">
        complex logic 🧠
        <span class="absolute inset-0 w-full h-full bg-warning-amber/30 dark:bg-warning-amber/40 -z-10 rounded-sm group-hover:opacity-80 transition-all duration-300"></span>
      </span>
      with
      <span class="inline-block relative font-bold text-foreground px-1 mx-1 z-10 group cursor-default">
        elegant aesthetics ✨
        <span class="absolute inset-0 w-full h-full bg-action-blue/30 dark:bg-primary/40 -z-10 rounded-sm group-hover:opacity-80 transition-all duration-300"></span>
      </span>.
    </p>

    <!-- CTA Buttons -->
    <div
      class="flex flex-col sm:flex-row gap-4 sm:gap-5 justify-center items-center mb-8 sm:mb-10 md:mb-8 lg:mb-6 px-4 sm:px-0 animate-slide-up safe-area-inset"
      style="animation-delay: 500ms">

      <!-- Primary CTA -->
      <button (click)="scrollToProjects()"
        class="group font-handwriting text-lg sm:text-xl font-medium bg-warning-amber text-[#121826] dark:text-[#0C0C0E] rounded-sketchy-2 shadow-stamp dark:shadow-glow-accent hover:shadow-stamp-hover dark:hover:shadow-glow-accent hover:-rotate-1 transition-all w-full sm:w-auto min-w-[140px] sm:min-w-[160px] h-10 sm:h-12 flex items-center justify-center touch-feedback z-10 border-2 border-transparent">
        <lucide-icon name="pen-tool" class="mr-2 h-5 w-5 relative z-10"></lucide-icon>
        <span class="relative z-10 pt-1">View Work</span>
      </button>

      <!-- Secondary CTA -->
      <a routerLink="/resume"
        class="group font-sans border-2 border-action-blue/50 dark:border-primary/50 text-action-blue dark:text-primary bg-transparent border-dashed rounded-sketchy-3 hover:bg-action-blue hover:text-white dark:hover:bg-primary/10 dark:hover:text-primary transition-all w-full sm:w-auto min-w-[140px] sm:min-w-[160px] h-10 sm:h-12 flex items-center justify-center text-sm sm:text-base touch-feedback z-10">
        <lucide-icon name="file-text" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10">Resume</span>
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex justify-center gap-3 sm:gap-4 animate-slide-up" style="animation-delay: 600ms">
      @for (social of socials; track social.label) {
      <a [href]="social.href" target="_blank" rel="noopener noreferrer" [aria-label]="social.label"
        class="p-2 sm:p-2.5 rounded-full bg-white/70 dark:bg-white/5 border border-primary/20 dark:border-white/10 hover:shadow-lg hover:shadow-primary/15 transition-all duration-500 hover:scale-110 hover:-translate-y-1 backdrop-blur-none sm:backdrop-blur-md touch-feedback"
        [class]="social.color">
        <lucide-icon [name]="social.icon" class="w-4 h-4 sm:w-5 sm:h-5"></lucide-icon>
      </a>
      }
    </div>
  </div>

  <!-- Scroll indicator -->
  <button
    class="scroll-bob absolute bottom-6 sm:bottom-8 left-1/2 cursor-pointer p-2.5 sm:p-3 rounded-full hover:bg-white/20 transition-opacity duration-300 z-20 opacity-60 hover:opacity-100"
    (click)="scrollToAbout()" aria-label="Scroll down to about section">
    <lucide-icon name="arrow-down"
      class="w-5 h-5 sm:w-6 sm:h-6 text-primary/70 dark:text-primary/70 hover:text-primary dark:hover:text-primary transition-colors"></lucide-icon>
  </button>
</section>
