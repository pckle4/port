<section id="home" #heroHost
  class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 md:px-8 pt-20 md:pt-24 pb-16">

  <!-- Dark-mode grid with shimmer sweep -->
  <div class="hero-grid" aria-hidden="true">
    <div class="hero-grid-lines"></div>
  </div>

  @if (isDesktop) {
  <app-floating-icons></app-floating-icons>
  }

  <div class="container mx-auto text-center max-w-5xl relative z-10">

    <!-- Open to Work Badge -->
    <div class="mb-8 -mt-2 md:mt-4 flex justify-center animate-slide-up relative z-20">
      <div
        class="group relative inline-flex overflow-hidden rounded-full p-[2px] transition-all duration-500 hover:scale-105 hover:shadow-[0_0_2rem_-0.5rem_rgba(217,140,115,0.45)]">
        <span
          class="absolute inset-[-1000%] animate-[spin_4s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#1676F3_0%,#0C4CC7_20%,#5F5CE0_38%,#EB3357_56%,#FCA818_74%,#13AEDD_90%,#1676F3_100%)]"></span>
        <div
          class="relative inline-flex h-full w-full cursor-default items-center justify-center rounded-full px-5 py-2 text-sm font-medium bg-white dark:bg-[#0C1120] backdrop-blur-3xl">
          <lucide-icon name="zap"
            class="w-4 h-4 mr-2 text-accent dark:text-accent fill-accent dark:fill-accent"></lucide-icon>
          <span class="text-foreground dark:text-foreground font-semibold">Open to Work</span>
          <lucide-icon name="chevron-right"
            class="w-4 h-4 ml-1.5 text-primary dark:text-primary group-hover:translate-x-0.5 transition-transform"></lucide-icon>
        </div>
      </div>
    </div>

    <!-- Greeting -->
    <div class="mb-3 flex items-center justify-center space-x-2 text-muted-foreground animate-slide-up"
      style="animation-delay: 100ms">
      <span class="text-lg font-light tracking-wide">Hi, I'm</span>
    </div>

    <!-- Name -->
    <h1
      class="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black mb-5 tracking-tight relative inline-block animate-slide-up select-none pointer-events-none"
      style="animation-delay: 200ms">
      <span class="animate-gradient-text hero-name-gradient">Ansh Shah</span>
      <lucide-icon name="sparkles"
        class="absolute -top-3 -right-6 w-8 h-8 sm:w-10 sm:h-10 text-accent hidden sm:block animate-pulse"></lucide-icon>
    </h1>

    <!-- Dynamic Headline -->
    <div
      class="h-16 sm:h-20 md:h-24 flex items-center justify-center mb-5 text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold text-slate-900 dark:text-white animate-slide-up select-none pointer-events-none"
      style="animation-delay: 300ms">
      <app-animated-headline [words]="dynamicWords"></app-animated-headline>
    </div>

    <!-- Description -->
    <p class="mb-8 text-base sm:text-lg md:text-xl text-muted-foreground max-w-2xl mx-auto leading-relaxed animate-slide-up"
      style="animation-delay: 400ms">
      Building <span class="text-primary dark:text-primary font-semibold">digital masterpieces</span> that
      seamlessly blend
      <span class="inline-block relative font-medium text-foreground mx-1">
        complex logic
        <span class="absolute bottom-1 left-0 w-full h-[3px] bg-gradient-to-r from-primary/45 via-accent/35 to-[hsl(var(--light-bronze))]/45 -z-10 rounded-full"></span>
      </span>
      with
      <span class="inline-block relative font-medium text-foreground mx-1">
        elegant aesthetics
        <span class="absolute bottom-1 left-0 w-full h-[3px] bg-gradient-to-r from-[hsl(var(--light-coral))]/40 via-accent/35 to-[hsl(var(--dusty-lavender))]/40 -z-10 rounded-full"></span>

      </span>.
    </p>

    <!-- CTA Buttons -->
    <div
      class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center items-center mb-10 px-2 sm:px-0 animate-slide-up safe-area-inset"
      style="animation-delay: 500ms">

      <!-- Primary CTA -->
      <button (click)="scrollToProjects()"
        class="group btn-primary-action w-full sm:w-auto min-w-[180px] h-12 sm:h-12 text-base touch-feedback">
        <lucide-icon name="code" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10">View Work</span>
        <lucide-icon name="chevron-right"
          class="ml-1 h-4 w-4 btn-feedback-icon relative z-10"></lucide-icon>
      </button>

      <!-- Secondary CTA -->
      <a routerLink="/resume"
        class="group btn-outline-action w-full sm:w-auto min-w-[180px] h-12 sm:h-12 text-base touch-feedback">
        <lucide-icon name="download" class="mr-2 h-4 w-4 relative z-10"></lucide-icon>
        <span class="relative z-10">Resume</span>
        <lucide-icon name="arrow-up-right" class="ml-1 h-4 w-4 btn-feedback-icon relative z-10"></lucide-icon>
      </a>
    </div>

    <!-- Social Links -->
    <div class="flex justify-center gap-5 animate-slide-up" style="animation-delay: 600ms">
      @for (social of socials; track social.label) {
      <a [href]="social.href" target="_blank" rel="noopener noreferrer" [aria-label]="social.label"
        class="p-3 rounded-full bg-white/70 dark:bg-white/5 border border-primary/20 dark:border-white/10 hover:shadow-lg hover:shadow-primary/15 transition-all duration-500 hover:scale-110 hover:-translate-y-1 backdrop-blur-none sm:backdrop-blur-md touch-feedback"
        [class]="social.color">
        <lucide-icon [name]="social.icon" class="w-5 h-5"></lucide-icon>
      </a>
      }
    </div>
  </div>

  <!-- Scroll indicator -->
  <button
    class="scroll-bob absolute bottom-8 left-1/2 cursor-pointer p-3 rounded-full hover:bg-white/20 transition-opacity duration-300 z-20 opacity-60 hover:opacity-100"
    (click)="scrollToAbout()" aria-label="Scroll down to about section">
    <lucide-icon name="arrow-down"
      class="w-6 h-6 text-primary/70 dark:text-primary/70 hover:text-primary dark:hover:text-primary transition-colors"></lucide-icon>
  </button>
</section>
