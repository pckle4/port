@if (isOpen) {
<div class="fixed inset-0 z-[100] flex items-start justify-center p-4 pt-[12vh]">
  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-foreground/40 backdrop-blur-sm"
    (click)="onBackdropClick()"
    #backdrop
    aria-hidden="true"
  ></div>

  <!-- Dialog -->
  <div
    #dialog
    role="dialog"
    aria-modal="true"
    aria-label="Command palette"
    class="relative z-[101] flex max-h-[60vh] w-full max-w-md flex-col overflow-hidden rounded-2xl border-2 border-primary/30 dark:border-primary/40 bg-card text-card-foreground shadow-[0_0_30px_-5px_hsl(var(--primary)/0.2)] dark:shadow-[0_0_30px_-5px_hsl(var(--primary)/0.3)]"
  >
    <!-- Input -->
    <div class="flex items-center gap-3 border-b border-border px-4 shrink-0">
      <span aria-hidden="true" class="text-muted-foreground text-xl leading-none pt-1">⌕</span>
      <input
        #searchInput
        class="w-full bg-transparent py-4 text-sm text-foreground outline-none placeholder:text-muted-foreground"
        placeholder="Type a command or search…"
        [value]="query"
        (input)="onQueryChange($any($event.target).value)"
        spellcheck="false"
        autocomplete="off"
      />
    </div>

    <!-- Results -->
    <div class="overflow-y-auto p-2 relative scrollbar-hide" #listContainer>
      @if (filteredItems.length === 0) {
        <div class="px-3 py-8 text-center text-sm text-muted-foreground">
          No results found.
        </div>
      } @else {
        <!-- Highlight indicator element -->
        <div 
          #activeIndicator
          class="absolute left-2 right-2 rounded-lg bg-accent pointer-events-none transition-all duration-[250ms] ease-[cubic-bezier(0.2,0.8,0.2,1)]"
          style="height: 40px; top: -100px; transform: scale(1); opacity: 1;"
        ></div>

        @for (group of filteredGroups; track group.heading) {
          <div class="mb-1">
            @if (group.heading) {
              <div class="px-3 py-1.5 text-xs font-medium text-muted-foreground shrink-0">
                {{ group.heading }}
              </div>
            }
            @for (item of group.items; track item.id) {
              <button
                type="button"
                [attr.data-index]="item.globalIndex"
                (click)="selectItem(item)"
                (mousemove)="hoverItem(item.globalIndex!)"
                class="relative z-10 flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left text-sm text-foreground focus:outline-none"
              >
                @if (item.icon) {
                  <lucide-icon [name]="item.icon" class="relative text-muted-foreground h-4 w-4 shrink-0"></lucide-icon>
                }
                <span class="relative flex-1 truncate">{{ item.label }}</span>
                @if (item.shortcut) {
                  <kbd class="relative rounded border border-border px-1.5 py-0.5 text-[10px] uppercase font-medium text-muted-foreground shrink-0 bg-background/50 backdrop-blur-md">
                    {{ item.shortcut }}
                  </kbd>
                }
              </button>
            }
          </div>
        }
      }
    </div>
  </div>
</div>
}
