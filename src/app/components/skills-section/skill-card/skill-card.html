<div #card (mousemove)="onMouseMove($event)" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()"
  class="relative flex flex-col items-start gap-4 overflow-hidden rounded-2xl border border-white/10 bg-[#0a0a0a]/40 px-6 py-6 shadow-xl backdrop-blur-md transition-all duration-500 ease-[cubic-bezier(0.23,1,0.32,1)] hover:shadow-2xl hover:shadow-indigo-500/10 hover:-translate-y-1 dark:bg-[#0a0a0a]/50 will-change-transform group">
  <div class="pointer-events-none absolute -inset-px opacity-0 transition-opacity duration-500"
    [style.opacity]="opacity" [style.background]="gradient"></div>

  <div class="relative z-10 w-full">
    <div class="flex items-center gap-4 mb-4">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-lg bg-white/5 border border-white/10 text-xl shadow-inner transition-transform duration-500 group-hover:scale-110 group-hover:rotate-3">
        {{ category.icon }}
      </div>
      <div>
        <h3 class="text-lg font-bold text-gray-100 transition-colors duration-300 group-hover:text-white">{{
          category.title }}</h3>
      </div>
    </div>

    <p class="text-sm text-gray-400 mb-5 leading-relaxed transition-colors duration-300 group-hover:text-gray-300">{{
      category.description }}</p>

    <div class="flex flex-wrap gap-2">
      @for (skill of category.skills; track skill) {
      <span
        class="px-3 py-1 rounded-full text-[11px] font-semibold tracking-wide border border-white/5 bg-white/5 text-gray-300 transition-all duration-300 hover:bg-indigo-500/20 hover:text-white hover:border-indigo-500/40 hover:scale-105 cursor-default">
        {{ skill }}
      </span>
      }
    </div>
  </div>

  <div class="pointer-events-none absolute inset-0 transition-opacity duration-500" [style.opacity]="opacity"
    [style.background]="borderGradient"
    style="mask-image: linear-gradient(black, black) content-box, linear-gradient(black, black); -webkit-mask-image: linear-gradient(black, black) content-box, linear-gradient(black, black); mask-composite: exclude; -webkit-mask-composite: xor; padding: 1px; border-radius: inherit;">
  </div>
</div>
