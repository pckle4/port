<div #card
  class="relative flex flex-col items-start gap-4 overflow-hidden rounded-2xl border border-border dark:border-white/10 bg-card dark:bg-[#0a0a0a]/40 px-6 py-6 shadow-sm dark:shadow-xl backdrop-blur-md">

  <div class="relative z-10 w-full">
    <div class="flex items-center gap-4 mb-4">
      <div
        class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 dark:bg-white/5 border border-primary/20 dark:border-white/10 text-xl shadow-inner">
        {{ category.icon }}
      </div>
      <div>
        <h3 class="text-lg font-bold text-foreground dark:text-gray-100">{{
          category.title }}</h3>
      </div>
    </div>

    <p class="text-sm text-muted-foreground dark:text-gray-400 mb-5 leading-relaxed">{{
      category.description }}</p>

    <div class="flex flex-wrap gap-2">
      @for (skill of category.skills; track skill) {
      <span
        class="px-3 py-1 rounded-full text-[11px] font-semibold tracking-wide border border-border dark:border-white/5 bg-primary/5 dark:bg-white/5 text-foreground/70 dark:text-gray-300 cursor-default">
        {{ skill }}
      </span>
      }
    </div>
  </div>
</div>
