<div #card
  class="group relative flex flex-col items-start gap-3 sm:gap-4 overflow-hidden rounded-2xl border border-border dark:border-white/10 bg-card dark:bg-[#0a0a0a]/40 px-4 sm:px-6 py-4 sm:py-6 shadow-sm dark:shadow-xl backdrop-blur-md hover:-translate-y-1 hover:shadow-lg hover:border-primary/30 dark:hover:border-primary/30 transition-all duration-300"
  (mousemove)="onMouseMove($event)" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">

  <!-- Hover glow effect -->
  <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none rounded-2xl"
    [style.background]="gradient" [style.opacity]="opacity">
  </div>

  <div class="relative z-10 w-full">
    <div class="flex items-center gap-3 sm:gap-4 mb-3 sm:mb-4">
      <div
        class="flex h-9 w-9 sm:h-10 sm:w-10 items-center justify-center rounded-lg bg-primary/10 dark:bg-white/5 border border-primary/20 dark:border-white/10 text-lg sm:text-xl shadow-inner group-hover:scale-110 transition-transform duration-300">
        {{ category.icon }}
      </div>
      <div>
        <h3 class="text-base sm:text-lg font-bold text-foreground dark:text-gray-100">{{
          category.title }}</h3>
      </div>
    </div>

    <p class="text-xs sm:text-sm text-muted-foreground dark:text-gray-400 mb-4 sm:mb-5 leading-relaxed">{{
      category.description }}</p>

    <div class="flex flex-wrap gap-1.5 sm:gap-2">
      @for (skill of category.skills; track skill) {
      <span
        class="px-2 sm:px-3 py-0.5 sm:py-1 rounded-full text-[10px] sm:text-[11px] font-semibold tracking-wide border border-border dark:border-white/5 bg-primary/5 dark:bg-white/5 text-foreground/70 dark:text-gray-300 cursor-default group-hover:border-primary/20 dark:group-hover:border-primary/20 transition-colors duration-300">
        {{ skill }}
      </span>
      }
    </div>
  </div>
</div>
