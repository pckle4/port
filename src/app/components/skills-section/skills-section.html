<section class="py-16 sm:py-20 lg:py-24 relative overflow-hidden bg-[#050505] text-slate-100 dark"
  style="contain: layout style; scroll-margin-top: 96px;">
  <div class="absolute inset-0 z-0 opacity-15 pointer-events-none">
    <div class="absolute top-0 left-0 w-[50%] h-[50%] bg-primary/30 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-0 right-0 w-[50%] h-[50%] bg-accent/30 rounded-full blur-[100px]"></div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="max-w-7xl mx-auto">
      <div [class]="isVisible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 sm:translate-y-8'"
        class="transition-all duration-500 sm:duration-1000 text-center lg:text-left mb-8 sm:mb-10 lg:mb-12">
        <h2
          class="text-2xl sm:text-3xl md:text-5xl font-bold mb-3 sm:mb-4 bg-clip-text text-transparent bg-gradient-to-r from-slate-100 to-primary">
          Skills & Technologies
        </h2>
        <p class="text-slate-400 text-sm sm:text-base md:text-lg max-w-2xl mx-auto lg:mx-0 leading-relaxed">
          I specialize in building robust, scalable applications. My toolkit evolves continuously, but these are my
          core weapons of choice.
        </p>
      </div>

      <div class="grid lg:grid-cols-12 gap-8 md:gap-12 lg:gap-16 items-center">

        <!-- Skill Cards (left on desktop, bottom on mobile) -->
        <div class="lg:col-span-7 space-y-6 sm:space-y-8 order-2 lg:order-1">

          <div [class]="isVisible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 sm:translate-y-8'"
            class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-5 transition-all duration-500 sm:duration-1000 sm:delay-200">
            @for (category of skillCategories; track category.title) {
              <app-skill-card [category]="category"></app-skill-card>
            }
          </div>
        </div>

        <!-- Icon Orbit (right on desktop, top on mobile) -->
        <div class="lg:col-span-5 order-1 lg:order-2 flex justify-center items-center">
          <div
            class="relative w-full max-w-[300px] sm:max-w-[380px] lg:max-w-[500px] xl:max-w-[560px] transition-all duration-500 sm:duration-1000 sm:delay-300"
            [class.opacity-100]="isVisible()" [class.scale-100]="isVisible()" [class.opacity-0]="!isVisible()"
            [class.scale-95]="!isVisible()" [class.sm:scale-90]="!isVisible()">

            <div class="relative p-[1px] rounded-2xl overflow-hidden group">
              <div class="absolute inset-[-100%] animate-[spin_8s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#00000000_50%,hsl(var(--primary))_100%)]"></div>
              <div class="relative rounded-[15px] bg-[#0a0a0a] border border-white/10 p-0.5 sm:p-1 md:p-2 w-full h-full flex items-center justify-center min-h-[250px] sm:min-h-[320px] lg:min-h-[400px] xl:min-h-[460px]">
                <app-icon-cloud class="w-full h-full"></app-icon-cloud>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>
