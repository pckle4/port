<section class="py-20 sm:py-24 relative overflow-hidden bg-background"
  style="contain: layout style; scroll-margin-top: 96px;">
  <div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
    <div class="absolute top-0 left-0 w-[50%] h-[50%] bg-primary/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-0 right-0 w-[50%] h-[50%] bg-accent/20 rounded-full blur-[100px]"></div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="max-w-7xl mx-auto">
      <div class="grid lg:grid-cols-12 gap-12 lg:gap-16 items-center">

        <div class="lg:col-span-7 space-y-8 order-2 lg:order-1">
          <div [class]="isVisible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'"
            class="transition-all duration-1000">
            <h2
              class="text-3xl sm:text-4xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-foreground to-primary dark:from-white dark:to-[hsl(var(--light-coral))]">
              Skills & Technologies
            </h2>
            <p class="text-muted-foreground text-lg mb-8 max-w-2xl leading-relaxed">
              I specialize in building robust, scalable applications. My toolkit evolves continuously, but these are my
              core weapons of choice.
            </p>
          </div>

          <div [class]="isVisible() ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'"
            class="grid sm:grid-cols-2 gap-4 transition-all duration-1000 delay-200">
            @for (category of skillCategories; track category.title) {
              <app-skill-card [category]="category"></app-skill-card>
            }
          </div>
        </div>

        <div class="lg:col-span-5 order-1 lg:order-2 flex justify-center items-center">
          <div
            class="relative w-full aspect-square max-w-[320px] sm:max-w-[450px] transition-all duration-1000 delay-500"
            [class.opacity-100]="isVisible()" [class.scale-100]="isVisible()" [class.opacity-0]="!isVisible()"
            [class.scale-90]="!isVisible()">
            @defer (when shouldRenderCloud()) {
              <div
                class="h-full w-full relative flex items-center justify-center rounded-[14px] overflow-hidden p-[3px]">
                <span
                class="absolute inset-[-200%] animate-[spin_6s_linear_infinite] bg-[conic-gradient(from_90deg_at_50%_50%,#1676F3_0%,#5F5CE0_24%,#EB3357_48%,#FCA818_72%,#13AEDD_88%,#1676F3_100%)] opacity-100"></span>
                <div class="relative h-full w-full flex items-center justify-center rounded-[11px] bg-background dark:bg-[#0C1120]">
                  <app-icon-cloud [iconSlugs]="slugs"></app-icon-cloud>
                </div>
              </div>
            } @placeholder {
              <div class="h-full w-full"></div>
            }
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
