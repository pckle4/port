<div class="relative w-full h-full flex items-center justify-center" style="contain: layout style;">
  <div [id]="listIdAttr" class="absolute -left-[9999px] top-0 opacity-0 pointer-events-none">
    @for (icon of iconElements; track icon.title) {
      <a [title]="icon.title" href="#" (click)="$event.preventDefault()">
        <img [src]="icon.src" [alt]="icon.title" width="40" height="40" />
      </a>
    }
  </div>

  <div [id]="containerIdAttr" style="display:flex;justify-content:center;align-items:center;width:100%;height:100%;padding-top:0;contain:layout style;" class="relative z-10">
    <div class="relative w-full max-w-[70vh] aspect-square">
      <canvas #globeCanvas class="absolute inset-0 z-0 w-full h-full pointer-events-none"></canvas>
      <canvas [id]="canvasIdAttr" class="relative z-10 w-full h-full" width="1000" height="1000"></canvas>
    </div>
  </div>
</div>
