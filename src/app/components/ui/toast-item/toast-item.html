<div role="alert" aria-live="assertive" [class]="computedClass">
  <lucide-icon [name]="iconName" [class]="iconClass"></lucide-icon>
  <span class="flex-1">{{ data.message }}</span>
  <button (click)="close()" class="p-0.5 rounded hover:bg-black/5 dark:hover:bg-white/10 transition-colors"
    aria-label="Dismiss">
    <lucide-icon name="x" class="w-3.5 h-3.5"></lucide-icon>
  </button>
</div>
