<div [class]="wrapperClass">
  @if (variant === 'hero') {
  <div class="py-20 px-6 flex flex-col items-center gap-6" role="status" aria-busy="true"
    aria-label="Loading hero section">
    <app-bone class="h-4 w-24 block"></app-bone>
    <app-bone class="h-10 w-72 max-w-full block"></app-bone>
    <app-bone class="h-5 w-96 max-w-full block"></app-bone>
    <div class="flex gap-3 mt-4">
      <app-bone class="h-10 w-28 rounded-full block"></app-bone>
      <app-bone class="h-10 w-28 rounded-full block"></app-bone>
    </div>
  </div>
  } @else if (variant === 'card-grid') {
  <div class="py-16 px-6" role="status" aria-busy="true" aria-label="Loading section">
    <div class="max-w-5xl mx-auto">
      <app-bone class="h-8 w-48 mx-auto mb-10 block"></app-bone>
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (i of [1, 2, 3]; track i) {
        <div class="rounded-xl border border-border/30 p-5 space-y-4">
          <app-bone class="h-40 w-full rounded-lg block"></app-bone>
          <app-bone class="h-5 w-3/4 block"></app-bone>
          <app-bone class="h-4 w-full block"></app-bone>
          <app-bone class="h-4 w-2/3 block"></app-bone>
        </div>
        }
      </div>
    </div>
  </div>
  } @else if (variant === 'text-block') {
  <div class="py-16 px-6 max-w-3xl mx-auto space-y-4" role="status" aria-busy="true" aria-label="Loading content">
    <app-bone class="h-8 w-40 mx-auto mb-6 block"></app-bone>
    <app-bone class="h-4 w-full block"></app-bone>
    <app-bone class="h-4 w-5/6 block"></app-bone>
    <app-bone class="h-4 w-4/6 block"></app-bone>
    <app-bone class="h-4 w-full mt-4 block"></app-bone>
    <app-bone class="h-4 w-3/4 block"></app-bone>
  </div>
  } @else if (variant === 'form') {
  <div class="py-16 px-6 max-w-4xl mx-auto" role="status" aria-busy="true" aria-label="Loading form">
    <app-bone class="h-8 w-40 mx-auto mb-10 block"></app-bone>
    <div class="grid lg:grid-cols-2 gap-8">
      <div class="space-y-3">
        <app-bone class="h-64 w-full rounded-lg block"></app-bone>
        <app-bone class="h-16 w-full rounded-xl block"></app-bone>
      </div>
      <div class="rounded-xl border border-border/30 p-6 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <app-bone class="h-10 w-full block"></app-bone>
          <app-bone class="h-10 w-full block"></app-bone>
        </div>
        <app-bone class="h-24 w-full block"></app-bone>
        <app-bone class="h-10 w-full rounded-full block"></app-bone>
      </div>
    </div>
  </div>
  }
</div>
