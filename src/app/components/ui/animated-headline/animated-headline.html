<span class="relative inline-block px-2 mx-1 select-none pointer-events-none">
  <span
    class="absolute top-[10%] bottom-[5%] left-0 bg-cyan-500 dark:bg-amber-400 -z-10 rounded-sm mix-blend-normal shadow-sm dark:opacity-100"
    [style.width]="'102%'" [style.left]="'-1%'"
    [style.clipPath]="showHighlight ? 'inset(0 0 0 0)' : 'inset(0 100% 0 0)'"
    [style.opacity]="showHighlight ? '1' : '0'"
    [style.transition]="'clip-path 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease'"
    aria-hidden="true"></span>
  <span
    [style.transition]="'color 0.5s cubic-bezier(0.4, 0, 0.2, 1), -webkit-text-fill-color 0.5s cubic-bezier(0.4, 0, 0.2, 1)'"
    [ngClass]="[
      'relative z-10 font-extrabold tracking-tight',
      showHighlight
        ? 'text-white dark:text-[#0c0a09]'
        : 'bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300'
    ]">
    {{ displayText }}
  </span>
  <span class="text-cyan-500 dark:text-cyan-400 font-light ml-0.5 motion-reduce:hidden animate-pulse">|</span>
</span>
