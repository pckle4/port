<span class="headline-host relative inline-block select-none pointer-events-none" [class.hl]="showHighlight">
  <!-- Highlight sweep background -->
  <span class="headline-bg absolute inset-0 -z-10 rounded" aria-hidden="true"></span>

  <!-- Text layers: gradient (default) cross-fades to solid white when highlighted -->
  <span class="inline-block relative font-extrabold tracking-tight">
    <span class="headline-grad">{{ displayText }}</span>
    <span class="headline-solid absolute inset-0 flex items-center justify-center" aria-hidden="true">{{ displayText }}</span>
  </span>

  <!-- Blinking cursor -->
  <span class="headline-cursor motion-reduce:hidden" aria-hidden="true">|</span>
</span>
