@if (toastService.toasts().length > 0) {
<div class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 max-w-sm" aria-label="Notifications">
  @for (toast of toastService.toasts(); track toast.id) {
  <app-toast-item [data]="toast" (dismiss)="toastService.dismiss($event)"></app-toast-item>
  }
</div>
}
