@if (hasError) {
  <div class="flex flex-col items-center justify-center min-h-[50vh] px-6 py-16 text-center">
    <div class="w-16 h-16 rounded-full bg-rose-500/15 dark:bg-rose-500/20 flex items-center justify-center mb-6">
      <lucide-icon name="alert-triangle" class="w-8 h-8 text-rose-500 dark:text-rose-400"></lucide-icon>
    </div>
    <h2 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">
      Something went wrong
    </h2>
    <p class="text-slate-500 dark:text-slate-400 max-w-md mb-6 text-sm">
      An unexpected error occurred. Please try again.
    </p>
    <button
      (click)="reset()"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-medium text-sm transition-all shadow-md hover:shadow-lg"
    >
      <lucide-icon name="refresh-cw" class="w-4 h-4"></lucide-icon>
      Try Again
    </button>
  </div>
} @else {
  <ng-content></ng-content>
}
