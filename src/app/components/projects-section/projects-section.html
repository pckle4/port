<section class="py-16 sm:py-20 bg-gradient-to-b from-background via-secondary/20 to-background dark:from-[#06080F] dark:via-[#0a1020] dark:to-[#06080F] relative overflow-hidden"
  style="contain: layout style; scroll-margin-top: 96px;">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] sm:w-[800px] h-[200px] sm:h-[300px] bg-primary/5 blur-[80px] rounded-full">
    </div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 relative z-10">
    <div class="text-center mb-10 sm:mb-12 max-w-3xl mx-auto">
      <div
        class="inline-flex items-center justify-center px-3 py-1 mb-4 rounded-full bg-primary/10 dark:bg-primary/15 text-primary/90 dark:text-primary/70 text-xs font-bold uppercase tracking-wide border border-primary/30 dark:border-primary/30">
        <lucide-icon name="code-2" class="w-3 h-3 mr-1.5"></lucide-icon>
        Selected Work
      </div>
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-black mb-3 sm:mb-4 tracking-tight text-foreground">
        Featured <span class="text-primary dark:text-primary/80">Projects</span>
      </h2>
      <p class="text-sm sm:text-base md:text-lg text-muted-foreground leading-relaxed">
        A curated collection of web applications showcasing mastery in frontend architecture, user experience design,
        and performance optimization.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6 lg:gap-8 max-w-5xl mx-auto">
      @for (project of projects; track project.id) {
      <app-project-card [project]="project"></app-project-card>
      }
    </div>

    <div class="mt-10 sm:mt-12 text-center">
      <a href="https://github.com/theanshshah" target="_blank" rel="noopener noreferrer"
        class="inline-flex items-center h-10 sm:h-11 rounded-full px-5 sm:px-6 border-dashed border-2 border-border dark:border-border hover:border-primary dark:hover:border-primary hover:bg-primary/5 hover:text-primary dark:hover:text-primary transition-all font-medium text-sm text-muted-foreground">
        <lucide-icon name="github" class="w-4 h-4 mr-2"></lucide-icon> View Full Archive
      </a>
    </div>
  </div>
</section>
