<section id="projects"
  class="py-20 bg-gradient-to-b from-[#f8fafc] via-[#f1f5f9] to-[#f8fafc] dark:from-[#0c0a09] dark:via-[#09090b] dark:to-[#0c0a09] relative overflow-hidden"
  style="contain: layout style; scroll-margin-top: 96px;">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[300px] bg-indigo-500/5 blur-[80px] rounded-full">
    </div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 relative z-10">
    <div class="text-center mb-12 max-w-3xl mx-auto">
      <div
        class="inline-flex items-center justify-center px-3 py-1 mb-4 rounded-full bg-indigo-500/10 dark:bg-indigo-400/15 text-indigo-600 dark:text-indigo-300 text-xs font-bold uppercase tracking-wide border border-indigo-500/30 dark:border-indigo-400/30">
        <lucide-icon name="code-2" class="w-3 h-3 mr-1.5"></lucide-icon>
        Selected Work
      </div>
      <h2 class="text-3xl md:text-4xl font-black mb-4 tracking-tight text-foreground">
        Featured <span class="text-indigo-500 dark:text-indigo-400">Projects</span>
      </h2>
      <p class="text-base sm:text-lg text-muted-foreground leading-relaxed">
        A curated collection of web applications showcasing mastery in frontend architecture, user experience design,
        and performance optimization.
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-6 lg:gap-8 max-w-5xl mx-auto">
      @for (project of projects; track project.id) {
      <app-project-card [project]="project"></app-project-card>
      }
    </div>

    <div class="mt-12 text-center">
      <a href="https://github.com/theanshshah" target="_blank" rel="noopener noreferrer"
        class="inline-flex items-center h-11 rounded-full px-6 border-dashed border-2 border-slate-300 dark:border-slate-700 hover:border-indigo-500 dark:hover:border-indigo-500 hover:bg-indigo-500/5 hover:text-indigo-500 dark:hover:text-indigo-400 transition-all font-medium text-muted-foreground">
        <lucide-icon name="github" class="w-4 h-4 mr-2"></lucide-icon> View Full Archive
      </a>
    </div>
  </div>
</section>
