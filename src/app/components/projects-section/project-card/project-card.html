<div [id]="project.id"
  class="group relative flex flex-col rounded-xl border border-slate-200/80 dark:border-white/10 bg-white dark:bg-[#0a0a0a]/50 shadow-sm hover:shadow-xl hover:shadow-cyan-500/10 dark:hover:shadow-cyan-500/10 transition-all duration-700 ease-[cubic-bezier(0.23,1,0.32,1)] hover:-translate-y-2 overflow-hidden h-full will-change-transform scroll-mt-24">

  <div class="absolute inset-0 -z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
    <div
      class="absolute inset-0 bg-gradient-to-r from-transparent via-slate-200/30 dark:via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out">
    </div>
  </div>

  <div
    class="h-7 bg-slate-100 dark:bg-slate-900/50 border-b border-slate-200/80 dark:border-white/5 flex items-center px-3 space-x-1.5 shrink-0">
    <div class="w-2 h-2 rounded-full bg-red-400/80"></div>
    <div class="w-2 h-2 rounded-full bg-yellow-400/80"></div>
    <div class="w-2 h-2 rounded-full bg-green-400/80"></div>
    <div
      class="ml-3 flex-1 h-3.5 bg-slate-200/60 dark:bg-white/5 rounded text-[9px] flex items-center px-2 text-slate-500 dark:text-muted-foreground font-mono truncate opacity-0 group-hover:opacity-100 transition-opacity duration-500">
      {{ project.links.demo.replace('https://', '') }}
    </div>
  </div>

  <div
    class="relative w-full aspect-video overflow-hidden border-b border-slate-200/80 dark:border-white/5 bg-slate-50 dark:bg-black/20 group-hover:brightness-105 transition-all duration-700">
    <div
      class="absolute inset-0 transition-transform duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)] group-hover:scale-110">
      <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover" />
    </div>

    <div
      class="absolute inset-0 flex items-center justify-center gap-4 bg-black/40 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-all duration-300">
      <a [href]="project.links.demo" target="_blank" rel="noopener noreferrer"
        class="rounded-full shadow-lg px-4 py-2 bg-cyan-600 text-white text-sm font-medium flex items-center">
        <lucide-icon name="globe" class="w-3.5 h-3.5 mr-2"></lucide-icon> Live Demo
      </a>
      @if (project.links.github !== "#") {
      <a [href]="project.links.github" target="_blank" rel="noopener noreferrer"
        class="rounded-full bg-slate-800/90 hover:bg-slate-800 border border-white/20 shadow-lg px-4 py-2 text-white text-sm font-medium flex items-center">
        <lucide-icon name="github" class="w-3.5 h-3.5 mr-2"></lucide-icon> Code
      </a>
      }
    </div>
  </div>

  <div class="p-5 flex flex-col flex-1">
    <div class="flex items-start justify-between mb-2">
      <div>
        <span
          class="inline-flex items-center text-[9px] font-semibold uppercase tracking-wider text-cyan-500 dark:text-cyan-400 mb-0.5">
          {{ project.category }}
        </span>
        <h3
          class="text-lg font-bold text-foreground group-hover:text-cyan-500 dark:group-hover:text-cyan-400 transition-colors">
          {{ project.title }}
        </h3>
      </div>
      <a [href]="project.links.demo" target="_blank" rel="noopener noreferrer"
        class="text-muted-foreground hover:text-foreground transition-colors p-1" [title]="'Open ' + project.title">
        <lucide-icon name="arrow-up-right" class="w-5 h-5"></lucide-icon>
      </a>
    </div>

    <p class="text-sm text-muted-foreground leading-relaxed mb-4 line-clamp-3">
      {{ project.description }}
    </p>

    <div class="mt-auto pt-3 border-t border-slate-200/60 dark:border-white/5 flex flex-wrap gap-2 items-center justify-between">
      <div class="flex flex-wrap gap-1.5">
        @for (tag of project.tags; track tag) {
        <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-gray-300">
          {{ tag }}
        </span>
        }
      </div>
      @if (project.date) {
      <div class="flex items-center text-[10px] text-muted-foreground/60 font-medium">
        <lucide-icon name="calendar" class="w-3 h-3 mr-1"></lucide-icon>
        {{ project.date }}
      </div>
      }
    </div>
  </div>
</div>
