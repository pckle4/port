<div [id]="project.id"
  class="group relative flex flex-col rounded-sketchy-1 border-[1.5px] border-dashed border-border/80 dark:border-[#2E2E33] bg-warm-paper dark:bg-[#161618] shadow-stamp-subtle dark:shadow-glow-charcoal hover:shadow-stamp-hover dark:hover:shadow-glow-interactive dark:hover:bg-[#1C1C1F] transition-all duration-300 sm:duration-700 ease-spring hover:-translate-y-1 hover:rotate-[0.5deg] hover:border-primary/50 dark:hover:border-primary/30 overflow-hidden h-full will-change-transform scroll-mt-12 p-0">

  <div class="absolute inset-0 -z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
    <div
      class="absolute inset-0 bg-gradient-to-r from-transparent via-primary/5 dark:via-accent/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out">
    </div>
  </div>

  <!-- Window chrome (Stylized for handcrafted) -->
  <div
    class="h-7 bg-kraft-paper/40 dark:bg-[#1C1C1F] border-b-[1.5px] border-dashed border-border/80 dark:border-[#2E2E33] flex items-center px-3 space-x-1.5 shrink-0">
    <div class="w-2 h-2 rounded-full bg-accent/85 border border-foreground/10"></div>
    <div class="w-2 h-2 rounded-full bg-light-coral/85 border border-foreground/10"></div>
    <div class="w-2 h-2 rounded-full bg-primary/85 border border-foreground/10"></div>
    <div
      class="ml-3 flex-1 h-3.5 bg-white/50 dark:bg-white/5 rounded text-[8px] sm:text-[9px] flex items-center px-2 text-muted-foreground font-mono truncate opacity-0 group-hover:opacity-100 transition-opacity duration-500">
      {{ project.links.demo.replace('https://', '') }}
    </div>
  </div>

  <!-- Image -->
  <div
    class="relative w-full aspect-[16/10] sm:aspect-video overflow-hidden border-b-[1.5px] border-dashed border-border/80 bg-[#ECF0F8]/60 dark:bg-background/20 group-hover:brightness-105 transition-all duration-300 sm:duration-700">
    <div
      class="absolute inset-0 transition-transform duration-500 sm:duration-1000 ease-[cubic-bezier(0.23,1,0.32,1)] group-hover:scale-[1.03]">
      <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover" loading="lazy" />
    </div>

    <div
      class="absolute inset-0 flex items-center justify-center gap-3 sm:gap-4 bg-warm-paper/40 dark:bg-[#1C1C1F]/60 backdrop-blur-[2px] opacity-0 group-hover:opacity-100 transition-all duration-300">
      <a [href]="project.links.demo" target="_blank" rel="noopener noreferrer"
        class="rounded-sketchy-3 shadow-stamp px-3 sm:px-4 py-1.5 sm:py-2 bg-primary text-white text-xs sm:text-sm font-semibold flex items-center hover:-translate-y-0.5 transition-transform border-[1.5px] border-transparent">
        <lucide-icon name="globe" class="w-3 h-3 sm:w-3.5 sm:h-3.5 mr-1.5 sm:mr-2"></lucide-icon> Live Demo
      </a>
      @if (project.links.github !== "#") {
      <a [href]="project.links.github" target="_blank" rel="noopener noreferrer"
        class="rounded-sketchy-3 bg-warm-paper dark:bg-background text-foreground hover:bg-kraft-paper dark:hover:bg-secondary border-[1.5px] border-dashed border-foreground/40 dark:border-white/20 shadow-stamp px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm font-semibold flex items-center hover:-translate-y-0.5 transition-all">
        <lucide-icon name="github" class="w-3 h-3 sm:w-3.5 sm:h-3.5 mr-1.5 sm:mr-2"></lucide-icon> Code
      </a>
      }
    </div>
    
    <!-- Decorative Sticky Tape -->
    <div class="absolute -top-2 -right-4 w-12 h-4 bg-tape-tan/80 rotate-12 shadow-sm z-10 mix-blend-multiply"></div>
  </div>

  <!-- Content -->
  <div class="p-4 sm:p-5 flex flex-col flex-1 bg-warm-paper dark:bg-transparent relative">
    <div class="flex items-start justify-between mb-1.5 sm:mb-2 relative z-10">
      <div>
        <span
          class="inline-flex items-center text-[8px] sm:text-[9px] font-bold uppercase tracking-wider text-primary dark:text-primary/80 mb-0.5">
          {{ project.category }}
        </span>
        <h3
          class="text-base sm:text-lg font-bold text-foreground group-hover:text-primary dark:group-hover:text-primary/80 transition-colors font-mono">
          {{ project.title }}
        </h3>
      </div>
      <a [href]="project.links.demo" target="_blank" rel="noopener noreferrer"
        class="text-muted-foreground hover:text-foreground transition-colors p-1 shrink-0" [title]="'Open ' + project.title">
        <lucide-icon name="arrow-up-right" class="w-4 h-4 sm:w-5 sm:h-5"></lucide-icon>
      </a>
    </div>

    <p class="text-xs sm:text-sm text-muted-foreground leading-relaxed mb-3 sm:mb-4 line-clamp-3 relative z-10">
      {{ project.description }}
    </p>

    <div class="mt-auto pt-2.5 sm:pt-3 border-t-[1.5px] border-dashed border-border/60 dark:border-border/80 flex flex-wrap gap-1.5 sm:gap-2 items-center justify-between relative z-10">
      <div class="flex flex-wrap gap-1 sm:gap-1.5">
        @for (tag of project.tags; track tag) {
        <span class="inline-flex items-center px-1.5 sm:px-2 py-0.5 rounded-sm text-[9px] sm:text-[10px] font-bold font-mono bg-accent/50 dark:bg-white/5 text-foreground dark:text-foreground/80 border border-warning-amber/20">
          {{ tag }}
        </span>
        }
      </div>
      @if (project.date) {
      <div class="flex items-center text-[9px] sm:text-[10px] text-muted-foreground/80 font-bold font-mono">
        <lucide-icon name="calendar" class="w-2.5 h-2.5 sm:w-3 sm:h-3 mr-1"></lucide-icon>
        {{ project.date }}
      </div>
      }
    </div>
  </div>
</div>
