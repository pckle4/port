<div class="relative w-full h-full min-h-[300px] flex items-center justify-center"
  style="will-change: transform">
  <div
    class="absolute z-20 w-20 h-20 bg-gradient-to-br from-primary to-primary/80 rounded-full flex items-center justify-center shadow-lg shadow-primary/30 animate-pulse">
    <lucide-icon name="brain" class="w-8 h-8 text-white"></lucide-icon>
  </div>

  <div class="absolute w-[160px] h-[160px] sm:w-[200px] sm:h-[200px] lg:w-[240px] lg:h-[240px] border border-primary/80/30 rounded-full animate-[spin_30s_linear_infinite]"
    style="will-change: transform">
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-primary/80/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="code" class="w-4 h-4 text-primary"></lucide-icon>
    </div>
    <div
      class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-8 h-8 bg-background border border-accent/80/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="palette" class="w-4 h-4 text-accent"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-primary/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="terminal" class="w-4 h-4 text-primary"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-slate-400/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="globe" class="w-4 h-4 text-slate-500"></lucide-icon>
    </div>
  </div>

  <div
    class="absolute w-[240px] h-[240px] sm:w-[280px] sm:h-[280px] lg:w-[340px] lg:h-[340px] border border-accent/80/20 rounded-full animate-[spin_45s_linear_infinite_reverse]"
    style="will-change: transform">
    <div
      class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-primary/70/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="rocket" class="w-4 h-4 text-primary/80"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-accent/70/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="zap" class="w-4 h-4 text-accent/80"></lucide-icon>
    </div>
    <div
      class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-9 h-9 bg-background border border-accent/45 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="coffee" class="w-4 h-4 text-accent"></lucide-icon>
    </div>
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-[hsl(var(--dusty-lavender))]/45 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="lightbulb" class="w-4 h-4 text-[hsl(var(--dusty-lavender))]"></lucide-icon>
    </div>
  </div>
</div>
