<div class="relative w-full h-full min-h-[300px] flex items-center justify-center"
  style="will-change: transform">
  <div
    class="absolute z-20 w-20 h-20 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/30 animate-pulse">
    <lucide-icon name="brain" class="w-8 h-8 text-white"></lucide-icon>
  </div>

  <div class="absolute w-[200px] h-[200px] border border-indigo-400/30 rounded-full animate-[spin_30s_linear_infinite]"
    style="will-change: transform">
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-indigo-400/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="code" class="w-4 h-4 text-indigo-500"></lucide-icon>
    </div>
    <div
      class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-8 h-8 bg-background border border-amber-400/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="palette" class="w-4 h-4 text-amber-500"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-teal-400/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="terminal" class="w-4 h-4 text-teal-500"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-8 h-8 bg-background border border-slate-400/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="globe" class="w-4 h-4 text-slate-500"></lucide-icon>
    </div>
  </div>

  <div
    class="absolute w-[280px] h-[280px] border border-amber-400/20 rounded-full animate-[spin_45s_linear_infinite_reverse]"
    style="will-change: transform">
    <div
      class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-indigo-300/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="rocket" class="w-4 h-4 text-indigo-400"></lucide-icon>
    </div>
    <div
      class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-amber-300/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="zap" class="w-4 h-4 text-amber-400"></lucide-icon>
    </div>
    <div
      class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-9 h-9 bg-background border border-teal-300/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="coffee" class="w-4 h-4 text-teal-500"></lucide-icon>
    </div>
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-9 h-9 bg-background border border-indigo-200/50 rounded-full flex items-center justify-center shadow-sm hover:scale-110 transition-transform">
      <lucide-icon name="lightbulb" class="w-4 h-4 text-amber-300"></lucide-icon>
    </div>
  </div>
</div>
