<div
  class="w-full rounded-lg bg-[#06091A] border border-[#1C2E52] shadow-xl overflow-hidden font-mono text-[10px] sm:text-xs"
  style="contain: content;">
  <div class="bg-[#0B1225] px-3 py-2 flex items-center justify-between border-b border-[#1C2E52]">
    <div class="flex space-x-1.5">
      <div class="w-2.5 h-2.5 rounded-full bg-accent"></div>
      <div class="w-2.5 h-2.5 rounded-full bg-[hsl(var(--light-coral))]"></div>
      <div class="w-2.5 h-2.5 rounded-full bg-primary"></div>
    </div>
    <div class="flex items-center gap-1.5 text-gray-500">
      <lucide-icon name="terminal" class="w-3 h-3"></lucide-icon>
      <span>zsh</span>
    </div>
  </div>

  <div class="p-4 sm:p-5 h-[240px] sm:h-[300px] overflow-y-auto text-[#C3D1E8] relative">
    <div class="space-y-1">
      <div class="flex items-center">
        <span class="text-primary mr-2">?</span>
        <span class="text-[hsl(var(--light-coral))] mr-2">~</span>
        <span class="text-[#b8aea0] font-medium">fetch_contact_info.sh</span>
      </div>
      <div class="text-primary mt-1">? Access Granted</div>

      @if (showContent) {
      <div class="mt-4 animate-fade-in space-y-1">
        <div class="text-[hsl(var(--light-coral))]">{{ '{' }}</div>
        <div class="pl-4">
          <span class="text-primary">"status"</span>: <span class="text-accent">"available"</span>,
        </div>
        <div class="pl-4">
          <span class="text-primary">"email"</span>: <span class="text-[hsl(var(--dusty-lavender))] cursor-pointer hover:underline"
            (click)="copyEmail()">"ansh&#64;nowhile.com"</span>,
        </div>
        <div class="pl-4">
          <span class="text-primary">"location"</span>: <span class="text-[hsl(var(--light-coral))]">"Gujarat, India"</span>,
        </div>
        <div class="pl-4">
          <span class="text-primary">"response_time"</span>: <span class="text-[hsl(var(--light-coral))]">"&lt; 24h"</span>
        </div>
        <div class="text-[#6680A5]">{{ '}' }}</div>

        <div class="flex items-center mt-4">
          <span class="text-primary mr-2">?</span>
          <span class="text-[hsl(var(--light-coral))] mr-2">~</span>
          <span class="w-2 h-4 bg-primary animate-pulse"></span>
        </div>
      </div>
      }
    </div>
  </div>
</div>
