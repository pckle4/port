<div
  class="w-full rounded-xl bg-[#090b10]/95 backdrop-blur-xl border border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.5)] overflow-hidden font-mono text-[11px] sm:text-[13px]"
  style="contain: content;">
  <div class="bg-[#1a1e29]/80 px-4 py-3 flex items-center justify-between border-b border-white/5">
    <div class="flex space-x-2">
      <div class="w-3 h-3 rounded-full bg-[#ff5f56] shadow-sm"></div>
      <div class="w-3 h-3 rounded-full bg-[#ffbd2e] shadow-sm"></div>
      <div class="w-3 h-3 rounded-full bg-[#27c93f] shadow-sm"></div>
    </div>
    <div class="flex items-center gap-1.5 text-slate-400 font-medium text-[10px] sm:text-xs tracking-wide">
      <lucide-icon name="terminal" class="w-3.5 h-3.5"></lucide-icon>
      <span>ansh — -zsh — 80x24</span>
    </div>
    <div class="w-12"></div> <!-- Spacer for exact center alignment -->
  </div>

  <div class="p-5 sm:p-6 h-[260px] sm:h-[320px] overflow-y-auto text-[#abb2bf] relative leading-relaxed scrollbar-thin scrollbar-thumb-white/10 scrollbar-track-transparent">
    <div class="space-y-1">
      <div class="flex items-center">
        <span class="text-[#98c379] mr-2 font-bold">➜</span>
        <span class="text-[#61afef] mr-2 font-bold">~</span>
        <span class="text-[#abb2bf]">./contact_api.sh</span>
      </div>
      <div class="text-[#98c379] mt-2 mb-2 tracking-wide text-[10px] sm:text-xs opacity-90">> Handshake established [200 OK]</div>

      @if (showContent) {
      <div class="mt-4 space-y-0.5 whitespace-pre font-mono">
        @for (line of renderedLines; track $index) {
          <div>
            @for (token of line.tokens; track $index) {
              <span [class]="token.color"
                    (click)="handleTerminalClick(token)">
                {{ token.text }}
              </span>
            }
            @if (!finishedTyping && $index === renderedLines.length - 1) {
              <span class="inline-block w-1.5 h-3.5 bg-white/70 animate-pulse ml-0.5 align-middle"></span>
            }
          </div>
        }

        @if (finishedTyping) {
        <div class="flex items-center mt-4 animate-fade-in text-[11px] sm:text-[13px]">
          <span class="text-[#98c379] mr-2 font-bold">➜</span>
          <span class="text-[#61afef] mr-2 font-bold">~</span>
          <span class="w-2 h-4 bg-[#e5c07b] animate-pulse"></span>
        </div>
        }
      </div>
      }
    </div>
  </div>
</div>
