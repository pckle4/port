<app-navbar>
  <app-nav-body>
    <app-navbar-logo>
      <a routerLink="/" class="group relative flex items-center gap-2 font-bold transition-all duration-300 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-500/60 rounded-lg px-1 -mx-1" aria-label="Go to homepage">
        <span class="text-xl font-extrabold tracking-tight text-black dark:text-white select-none transition-all duration-300 group-hover:scale-105"
          style="font-family: 'JetBrains Mono', monospace;">
          NOWHILE<span class="text-indigo-500 animate-pulse">_</span>
        </span>
      </a>
    </app-navbar-logo>

    <nav class="flex items-center gap-1">
      @for (item of navigation; track item.id) {
        <button
          [class]="getNavItemClass(item.id)"
          (click)="handleNavClick(item.link, item.id)"
          [tabIndex]="isNavItemHidden(item.id) ? -1 : 0"
          [attr.aria-hidden]="isNavItemHidden(item.id) ? true : null"
        >
          <span [class]="getNavItemActiveClass(item.id)"></span>
          <span class="flex items-center gap-2 relative z-10">
            <lucide-icon [name]="item.icon" class="h-4 w-4" [class.text-purple-500]="item.id === 'resume' && state.isCondensed()"></lucide-icon>
            {{ item.name }}
          </span>
        </button>
      }
    </nav>

    <div class="flex items-center gap-4">
      <button
        (click)="openSearch()"
        class="p-2 hover:bg-gray-100/80 dark:hover:bg-gray-800/80 rounded-lg transition-all duration-300 group hover:scale-110"
        title="Search (Ctrl+K)"
        aria-label="Open search (Ctrl+K)"
      >
        <lucide-icon name="search" class="h-5 w-5 text-gray-600 dark:text-gray-300 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-all duration-300"></lucide-icon>
      </button>
      <app-theme-toggle></app-theme-toggle>
    </div>
  </app-nav-body>

  <app-mobile-nav>
    <app-mobile-nav-header class="flex items-center justify-between w-full relative">
      <div class="flex-1 basis-0 min-w-0 flex justify-start z-10 relative">
        <app-mobile-nav-toggle [isOpen]="isMobileMenuOpen()" (toggle)="toggleMobileMenu()"></app-mobile-nav-toggle>
      </div>
      <app-navbar-logo class="flex-1 basis-0 min-w-0 flex justify-center z-10 relative">
        <a routerLink="/" class="flex items-center font-bold group max-w-full" (click)="closeMobileMenu()">
          <span class="text-[0.95rem] sm:text-lg font-extrabold tracking-tight text-black dark:text-white select-none whitespace-nowrap truncate"
            style="font-family: 'JetBrains Mono', monospace;">
            NOWHILE<span class="text-indigo-500 animate-pulse">_</span>
          </span>
        </a>
      </app-navbar-logo>
      <div class="flex-1 basis-0 min-w-0 flex items-center justify-end gap-0.5 sm:gap-2 z-10 relative">
        <button (click)="openSearch()" class="p-1.5 sm:p-2" aria-label="Open search">
          <lucide-icon name="search" class="h-4 w-4 sm:h-5 sm:w-5"></lucide-icon>
        </button>
        <app-theme-toggle></app-theme-toggle>
      </div>
    </app-mobile-nav-header>

    <app-mobile-nav-menu [isOpen]="isMobileMenuOpen()" (closeMenu)="closeMobileMenu()">
      @for (item of navigation; track item.id) {
        <button
          [class]="getMobileItemClass(item.id)"
          (click)="handleNavClick(item.link, item.id)"
        >
          <lucide-icon [name]="item.icon" class="h-4 w-4"></lucide-icon>
          <span class="text-lg">{{ item.name }}</span>
        </button>
      }
    </app-mobile-nav-menu>
  </app-mobile-nav>
</app-navbar>

@if (isSearchOpen()) {
  <app-spotlight-search [isOpen]="isSearchOpen()" (close)="closeSearch()"></app-spotlight-search>
}
