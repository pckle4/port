<div class="absolute top-2 sm:top-4 left-1/2 -translate-x-1/2 z-50 w-[95%] max-w-5xl pointer-events-none flex justify-center">
  <header class="pointer-events-auto flex w-full items-center justify-between gap-3 sm:gap-5 rounded-full border border-border/50 dark:border-white/10 bg-white/80 dark:bg-[#121826]/80 backdrop-blur-xl px-5 sm:px-6 py-2 sm:py-1.5 shadow-lg shadow-black/5 dark:shadow-black/20 transition-all duration-300">
    
    <!-- Left: Logo -->
    <div class="relative group cursor-pointer touch-feedback shrink-0">
      <!-- Sketch background effect -->
      <div class="absolute inset-0 bg-[#FBF7F0] dark:bg-[hsl(var(--card))] border-2 border-deep-navy/20 dark:border-white/10 rounded-sketchy-1 shadow-stamp dark:shadow-glow-charcoal transition-transform duration-300 group-hover:scale-105 group-hover:-rotate-1"></div>
           
      <h1 class="relative font-handwriting font-black tracking-tight text-foreground px-2 py-0.5 flex flex-col items-center justify-center text-[15px] sm:text-base whitespace-nowrap">
        <span>NOWHILE</span>
        <!-- Handcrafted SVG Underline (drawn on hover) -->
        <svg class="absolute -bottom-1 left-2 right-2 w-[calc(100%-16px)] h-3 stroke-warning-amber fill-none pointer-events-none stroke-[3px] opacity-0 group-hover:opacity-100 transition-opacity duration-150 delay-75" 
             viewBox="0 0 100 12" preserveAspectRatio="none">
          <path d="M 0,8 C 20,4 40,-2 60,6 C 75,10 90,8 100,2"
                class="[stroke-dasharray:300] [stroke-dashoffset:300] group-hover:animate-draw-stroke"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </h1>
    </div>

    <!-- Right: Search placeholder & Theme Switcher -->
    <div class="flex items-center gap-2 sm:gap-4 shrink-0">
      <!-- Search Placeholder (cir-search) -->
      <button class="cir-search hidden md:inline-flex text-left" (click)="openSearch()" aria-label="Search">
        <svg
          class="cir-search__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.34-4.34"></path>
        </svg>
        <span class="cir-search__field flex-1 truncate pointer-events-none">Search threads, contacts, replies...</span>
        <kbd class="cir-search__kbd">⌘ K</kbd>
      </button>
      
      <!-- Mobile Search Icon (only visible on small screens) -->
      <button (click)="openSearch()" class="md:hidden flex items-center justify-center w-9 h-9 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors touch-feedback" aria-label="Search">
        <lucide-icon name="search" class="w-[18px] h-[18px] text-foreground"></lucide-icon>
      </button>
      
      <!-- Theme Switcher -->
      <label for="themeToggle" class="themeToggle st-sunMoonThemeToggleBtn touch-feedback" aria-label="Toggle theme">
        <input type="checkbox" id="themeToggle" class="themeToggleInput" [checked]="isDark()" (change)="toggleTheme()" />
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor" stroke="none">
          <mask id="moon-mask">
            <rect x="0" y="0" width="20" height="20" fill="white"></rect>
            <circle cx="11" cy="3" r="8" fill="black"></circle>
          </mask>
          <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)"></circle>
          <g>
            <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5"></circle>
            <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5"></circle>
            <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5"></circle>
            <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5"></circle>
            <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5"></circle>
            <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5"></circle>
          </g>
        </svg>
      </label>
    </div>
  </header>
</div>

@defer (when isSearchOpen()) {
  <app-spotlight-search [isOpen]="isSearchOpen()" (close)="closeSearch()"></app-spotlight-search>
}

<app-tab-bar></app-tab-bar>
